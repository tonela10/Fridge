<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Menu Rail UI</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<!-- Mock Home Screen Content (Blurred Context) -->
<div class="relative min-h-screen flex flex-col blur-sm">
<header class="p-4 flex justify-between items-center border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
<span class="font-bold text-lg">Finanzas App</span>
</div>
<span class="material-symbols-outlined">menu</span>
</header>
<main class="p-4 space-y-4">
<div class="h-32 rounded-xl bg-gradient-to-br from-primary to-blue-600 p-4 text-white flex flex-col justify-end">
<p class="text-sm opacity-80">Saldo Total</p>
<h2 class="text-3xl font-bold">$12,450.00</h2>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-24 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"></div>
<div class="h-24 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"></div>
</div>
<div class="h-64 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700"></div>
</main>
<!-- Bottom Nav Placeholder -->
<div class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-3 pt-2 flex justify-around">
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">home</span>
<span class="text-xs font-medium">Home</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">history</span>
<span class="text-xs font-medium">History</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-xs font-medium">Stats</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">settings</span>
<span class="text-xs font-medium">Settings</span>
</div>
</div>
</div>
<!-- Overlay Backdrop -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40"></div>
<!-- Menu Rail (Side Navigation) -->
<aside class="fixed top-0 left-0 h-full w-[75%] max-w-sm bg-background-light dark:bg-background-dark shadow-2xl z-50 flex flex-col border-r border-slate-200 dark:border-slate-800">
<!-- Header -->
<div class="p-6 pb-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">MENU RAIL</h1>
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-500">close</span>
</button>
</div>
<!-- Navigation List -->
<nav class="flex-1 px-4 py-6 overflow-y-auto">
<ul class="space-y-2">
<li>
<a class="flex items-center gap-4 px-4 h-14 rounded-xl bg-primary/10 text-primary border border-primary/20 transition-all hover:bg-primary/20" href="#">
<span class="material-symbols-outlined">inventory_2</span>
<span class="font-semibold text-base">Inventario</span>
</a>
</li>
<li>
<a class="flex items-center gap-4 px-4 h-14 rounded-xl text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="font-semibold text-base">Deudas</span>
</a>
</li>
<li>
<a class="flex items-center gap-4 px-4 h-14 rounded-xl text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all" href="#">
<span class="material-symbols-outlined">archive</span>
<span class="font-semibold text-base">Añadir Bote</span>
</a>
</li>
<li>
<a class="flex items-center gap-4 px-4 h-14 rounded-xl text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all" href="#">
<span class="material-symbols-outlined">currency_exchange</span>
<span class="font-semibold text-base">Añadir Fondos</span>
</a>
</li>
</ul>
</nav>
<!-- Footer / Profile Section -->
</aside>
</body></html>
